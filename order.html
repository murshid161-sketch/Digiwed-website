<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order — DigiWed</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#faf7f2;--gold:#c9a84c;--gold2:#e8d5a3;--ink:#1c1610;--ink2:#3d3028;--ink3:#7a6d60;--green:#25D366;--white:#fff;--r:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
nav{background:var(--white);border-bottom:1px solid rgba(201,168,76,.15);padding:0 6%;height:60px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--ink);text-decoration:none;}
.logo span{color:var(--gold);}
.back{font-size:.78rem;color:var(--ink3);text-decoration:none;}
.back:hover{color:var(--gold);}

.page{max-width:520px;margin:0 auto;padding:36px 20px 80px;}

/* PLAN HEADER */
.plan-header{background:var(--white);border:1px solid rgba(201,168,76,.15);border-radius:16px;padding:24px;margin-bottom:24px;}
.plan-tag{font-size:.65rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.plan-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;margin-bottom:4px;}
.plan-price{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:400;color:var(--ink);line-height:1;margin-bottom:4px;}
.plan-price-note{font-size:.74rem;color:var(--ink3);margin-bottom:18px;}
.plan-features{list-style:none;border-top:1px solid var(--cream);padding-top:14px;}
.plan-features li{font-size:.82rem;color:var(--ink2);padding:5px 0;display:flex;align-items:center;gap:8px;}
.plan-features li::before{content:'✦';color:var(--gold);font-size:.55rem;flex-shrink:0;}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:14px;}

.step-card{background:var(--white);border:1px solid rgba(201,168,76,.15);border-radius:var(--r);padding:18px 20px;display:flex;align-items:flex-start;gap:16px;}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--ink);color:#fff;font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-body{flex:1;}
.step-title{font-size:.88rem;font-weight:600;color:var(--ink);margin-bottom:3px;}
.step-desc{font-size:.75rem;color:var(--ink3);line-height:1.55;margin-bottom:12px;}

/* BUTTONS */
.btn-gold{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-decoration:none;cursor:pointer;transition:all .2s;}
.btn-gold:hover{background:#b8922a;transform:translateY(-1px);}
.btn-dark{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-decoration:none;cursor:pointer;transition:all .2s;}
.btn-dark:hover{background:var(--ink2);}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s;}
.btn-wa:hover{background:#1da851;}
.btn-ghost{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 20px;background:transparent;color:var(--ink3);border:1px solid var(--gold2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:.78rem;text-decoration:none;transition:all .2s;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

.note{font-size:.7rem;color:var(--ink3);text-align:center;margin-top:10px;line-height:1.6;}

/* ALBUM BANNER */
.album-banner{background:linear-gradient(135deg,#1c1610,#3d2e20);border-radius:16px;padding:24px;margin-bottom:24px;color:#fff;}
.album-banner .plan-tag{color:var(--gold2);}
.album-banner .plan-title{color:#fff;}
.album-banner .plan-price{color:var(--gold);}
.album-banner .plan-price-note{color:rgba(255,255,255,.45);}
.album-banner .plan-features{border-color:rgba(255,255,255,.08);}
.album-banner .plan-features li{color:rgba(255,255,255,.75);}
.album-banner .plan-features li::before{color:var(--gold);}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Digi<span>Wed</span></a>
  <a href="index.html" class="back">← Back</a>
</nav>

<div class="page">

  <!-- Plan details injected by JS -->
  <div id="planHeader"></div>

  <!-- Steps injected by JS -->
  <div class="steps" id="steps"></div>

</div>

<script>
// ── PLAN DATA ──────────────────────────────────────────────────
const PLANS = {
  essential: {
    type: 'invitation',
    name: 'Essential Invitation',
    price: '₹2,000',
    priceNum: 2000,
    note: 'One-time payment · Hosted link delivered via WhatsApp',
    features: ['Fully customised invitation','Countdown timer & venue map','Family details section','Guest wishes wall','Add to calendar','WhatsApp link delivery'],
    payLink: 'https://rzp.io/rzp/CEJbr5XM',
    discountPrice: '₹1,000',
    discountLink: 'https://rzp.io/rzp/CEJbr5XM',
  },
  premium: {
    type: 'invitation',
    name: 'Premium Invitation',
    price: '₹2,500',
    priceNum: 2500,
    note: 'One-time payment · Hosted link delivered via WhatsApp',
    features: ['Everything in Essential','Photo gallery & carousel','Background music','Advanced animations','Luxury theme designs','Priority same-day delivery'],
    payLink: 'https://rzp.io/rzp/RL3RB1z',
    discountPrice: '₹1,500',
    discountLink: 'https://rzp.io/rzp/RL3RB1z',
  },
  customisation: {
    type: 'invitation',
    name: 'Custom Invitation',
    price: '₹3,500',
    priceNum: 3500,
    note: 'One-time payment · Includes full design consultation',
    features: ['100% custom design & layout','Custom background & colours','Custom fonts & animations','Dedicated design consultation','Unique theme built for you'],
    payLink: 'https://rzp.io/rzp/dguLImO',
    discountPrice: null,
    discountLink: null,
  },
  album: {
    type: 'album',
    name: 'Digital Wedding Album',
    price: '₹5,000',
    priceNum: 5000,
    note: 'One-time payment · Hosted forever · Shareable via WhatsApp',
    features: ['Photo & Reels feed','Likes & Comments','Guest Wall','Instagram-style stories','WhatsApp shareable link'],
    payLink: 'https://rzp.io/rzp/3iAphs0k',
    discountPrice: '₹3,500',
    discountLink: 'https://rzp.io/rzp/Br4STHfO',
  }
};

const OFFER_CODE   = 'jins';
const GOOGLE_FORM  = 'YOUR_GOOGLE_FORM_LINK_HERE'; // ← paste your Google Form URL here
const WA_NUMBER    = '917034852166';

const params  = new URLSearchParams(window.location.search);
const planKey = (params.get('plan') || 'essential').toLowerCase();
const plan    = PLANS[planKey] || PLANS.essential;

let offerApplied = false;
let activePrice  = plan.price;
let activeLink   = plan.payLink;

// ── RENDER PLAN HEADER ─────────────────────────────────────────
function renderHeader() {
  const isAlbum = plan.type === 'album';
  const cls = isAlbum ? 'album-banner' : 'plan-header';
  const priceHtml = offerApplied && plan.discountPrice
    ? `<span style="text-decoration:line-through;opacity:.4;font-size:1.5rem;margin-right:8px;">${plan.price}</span>${plan.discountPrice}`
    : plan.price;

  document.getElementById('planHeader').innerHTML = `
    <div class="${cls}">
      <div class="plan-tag">${isAlbum ? '📷 New Product' : '💌 Your Plan'}</div>
      <div class="plan-title">${plan.name}</div>
      <div class="plan-price" id="displayPrice">${priceHtml}</div>
      <div class="plan-price-note">${plan.note}</div>
      <ul class="plan-features">
        ${plan.features.map(f=>`<li>${f}</li>`).join('')}
      </ul>
    </div>`;
}

// ── RENDER STEPS ───────────────────────────────────────────────
function renderSteps() {
  const waMsg = encodeURIComponent(
    `Hi DigiWed! I've made the payment for *${plan.name}* (${offerApplied && plan.discountPrice ? plan.discountPrice : plan.price}). Please find my order details attached / in the form.`
  );

  let stepsHtml = '';

  if (plan.type === 'invitation') {
    stepsHtml = `
      <!-- Step 1: Google Form -->
      <div class="step-card">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">Fill Your Wedding Details</div>
          <div class="step-desc">Download and fill the order form with your wedding details — names, venue, date, and photos. My WhatsApp number is on the form.</div>
          <a href="${GOOGLE_FORM}" target="_blank" class="btn-gold">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Open Order Form
          </a>
        </div>
      </div>

      <!-- Step 2: Offer code -->
      <div class="step-card">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">Have an Offer Code? <span style="font-size:.7rem;color:var(--ink3);font-weight:400;">(optional)</span></div>
          <div class="step-desc">Enter your exclusive code to unlock a special price.</div>
          <div style="display:flex;gap:8px;margin-bottom:6px;">
            <input id="codeInput" type="text" placeholder="Enter code" maxlength="20"
              style="flex:1;padding:10px 14px;border:1px solid rgba(201,168,76,.25);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;background:var(--cream);outline:none;text-transform:uppercase;letter-spacing:.08em;">
            <button onclick="applyCode()" style="padding:10px 18px;background:var(--ink2);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;">Apply</button>
          </div>
          <div id="codeMsg" style="font-size:.72rem;min-height:16px;"></div>
        </div>
      </div>

      <!-- Step 3: Payment -->
      <div class="step-card">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-title">Make Payment</div>
          <div class="step-desc" id="payDesc">Pay securely via Razorpay — UPI, cards, net banking accepted.</div>
          <a id="payBtn" href="${plan.payLink}" target="_blank" class="btn-dark">
            Pay <span id="payAmount">${plan.price}</span> →
          </a>
        </div>
      </div>

      <!-- Step 4: WhatsApp -->
      <div class="step-card">
        <div class="step-num">4</div>
        <div class="step-body">
          <div class="step-title">Send WhatsApp Message</div>
          <div class="step-desc">After payment, message me on WhatsApp. Attach your filled form. I'll start building your invitation immediately.</div>
          <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" class="btn-wa">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Message on WhatsApp
          </a>
          <p class="note">📞 +91 70348 52166 · Delivered within 12 hours of payment</p>
        </div>
      </div>`;

  } else {
    // ALBUM flow — no form
    stepsHtml = `
      <!-- Step 1: Offer code -->
      <div class="step-card">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">Have an Offer Code? <span style="font-size:.7rem;color:var(--ink3);font-weight:400;">(optional)</span></div>
          <div class="step-desc">Enter your exclusive code to unlock a special price.</div>
          <div style="display:flex;gap:8px;margin-bottom:6px;">
            <input id="codeInput" type="text" placeholder="Enter code" maxlength="20"
              style="flex:1;padding:10px 14px;border:1px solid rgba(201,168,76,.25);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;background:var(--cream);outline:none;text-transform:uppercase;letter-spacing:.08em;">
            <button onclick="applyCode()" style="padding:10px 18px;background:var(--ink2);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;">Apply</button>
          </div>
          <div id="codeMsg" style="font-size:.72rem;min-height:16px;"></div>
        </div>
      </div>

      <!-- Step 2: Payment -->
      <div class="step-card">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">Make Payment</div>
          <div class="step-desc">Pay securely via Razorpay — UPI, cards, net banking accepted.</div>
          <a id="payBtn" href="${plan.payLink}" target="_blank" class="btn-dark">
            Pay <span id="payAmount">${plan.price}</span> →
          </a>
        </div>
      </div>

      <!-- Step 3: WhatsApp -->
      <div class="step-card">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-title">Send WhatsApp Message</div>
          <div class="step-desc">After payment, message me with your wedding photos and details. I'll set up your album right away.</div>
          <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" class="btn-wa">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Message on WhatsApp
          </a>
          <p class="note">📞 +91 70348 52166 · Album ready within 24 hours of payment</p>
        </div>
      </div>`;
  }

  document.getElementById('steps').innerHTML = stepsHtml;

  // Bind Enter key on code input
  setTimeout(() => {
    const inp = document.getElementById('codeInput');
    if (inp) inp.addEventListener('keydown', e => { if(e.key==='Enter') applyCode(); });
  }, 50);
}

// ── OFFER CODE ─────────────────────────────────────────────────
function applyCode() {
  const val = document.getElementById('codeInput').value.trim().toLowerCase();
  const msg = document.getElementById('codeMsg');

  if (val === OFFER_CODE && plan.discountPrice) {
    offerApplied = true;
    msg.style.color = '#1a7a40';
    msg.textContent = '✓ Offer applied — special price unlocked!';
    document.getElementById('payBtn').href   = plan.discountLink;
    document.getElementById('payAmount').textContent = plan.discountPrice;
    renderHeader(); // update price display
  } else if (!plan.discountPrice) {
    msg.style.color = '#c0392b';
    msg.textContent = 'No offer available for this plan.';
  } else if (val === '') {
    msg.style.color = '#c0392b';
    msg.textContent = 'Please enter a code.';
  } else {
    msg.style.color = '#c0392b';
    msg.textContent = 'Invalid code. Please check and try again.';
    if (offerApplied) {
      offerApplied = false;
      document.getElementById('payBtn').href = plan.payLink;
      document.getElementById('payAmount').textContent = plan.price;
      renderHeader();
    }
  }
}

// ── INIT ───────────────────────────────────────────────────────
renderHeader();
renderSteps();
</script>
</body>
</html>
